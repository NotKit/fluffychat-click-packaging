clickable_minimum_required: 7.1.2
builder: custom
kill: fluffychat
skip_review: true

dependencies_host:
- python3
- curl
- git
- cmake
- build-essential
- clang
- ninja-build
- pkg-config
- liblzma-dev
- zip
- unzip
- patchelf

dependencies_target:
- libegl1-mesa-dev
- libgles2-mesa-dev
- libglib2.0-dev
- libwayland-dev
- libxkbcommon-dev
- libdrm-dev
- libgbm-dev
- libinput-dev
- libudev-dev
- libsystemd-dev
- wayland-protocols
- libfontconfig-dev
- libmaliit-glib-dev
- libssl-dev

build:
- ${ROOT}/build.sh

libraries:
  flutter_elinux:
    src_dir: flutter-embedded-linux
    builder: cmake
    build_args:
    - -DBUILD_ELINUX_SO=ON
    - -DBACKEND_TYPE=WAYLAND
    - -DCMAKE_BUILD_TYPE=Release
    - -DFLUTTER_RELEASE=ON
    - -DENABLE_ELINUX_EMBEDDER_LOG=OFF
    dependencies_host:
    - clang
    - zip
    - unzip
    dependencies_target:
    - libegl1-mesa-dev
    - libgles2-mesa-dev
    - libglib2.0-dev
    - libwayland-dev
    - libxkbcommon-dev
    - libdrm-dev
    - libgbm-dev
    - libinput-dev
    - libudev-dev
    - wayland-protocols
    - libmaliit-glib-dev
    prebuild:
    - ${ROOT}/prebuild-flutter-embedded-linux.sh
    postbuild:
    - ${ROOT}/postbuild-flutter-embedded-linux.sh
